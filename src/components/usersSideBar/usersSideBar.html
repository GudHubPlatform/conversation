${
    groupedUsers.reduce((html, group, index) => {
        return html + `
            <div class="users_sidebar__group ${index === 0 ? '' : 'users_sidebar__group--collapsed'}" data-group-id="${group.group_id}">
                <div class="users_sidebar__group_name" onclick="toggleGroup()">
                    <svg class="users_sidebar__group_arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                    <span>${group.group_name}</span>
                </div>
                <div class="users_sidebar__group_users">
                    ${
                        group.users === null ? `
                            <div class="users_sidebar__group_loader loader"><span></span></div>
                        ` : group.users.reduce((usersHtml, user) => {
                            return usersHtml + `
                                <gh-user-side-bar-item class="users_sidebar__user" user-id="${user.user_id}"></gh-user-side-bar-item>
                            `;
                        }, '')
                    }
                </div>
            </div>
        `;
    }, '')
}
